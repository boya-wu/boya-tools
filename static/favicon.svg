<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Define the gradient combining Cobalt Blue and Rose Red from style.css -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
    <!-- Drop shadow for the inner icon to make it premium -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Squircle Background -->
  <rect width="512" height="512" rx="128" fill="url(#brand-grad)" />

  <!-- Minimalist Toolbox Icon -->
  <g filter="url(#shadow)">
    <!-- Briefcase Body -->
    <rect x="128" y="192" width="256" height="192" rx="24" fill="none" stroke="#ffffff" stroke-width="32" />
    
    <!-- Briefcase Handle -->
    <path d="M192 192V144C192 126.33 206.33 112 224 112H288C305.67 112 320 126.33 320 144V192" fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Briefcase Division line -->
    <line x1="128" y1="288" x2="384" y2="288" stroke="#ffffff" stroke-width="24" stroke-linecap="round" />
    
    <!-- Center Lock/Badge -->
    <rect x="232" y="264" width="48" height="48" rx="8" fill="#ffffff" />
  </g>
</svg>
